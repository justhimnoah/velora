<!DOCTYPE html>
<html lang="en">
<head>
  <script>
(function () {
  const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

  if (isMobile) {
    document.write(`
      <style>
        body {
          margin: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: radial-gradient(circle at top, #0b1c3f, #020615);
          color: white;
          font-family: system-ui, sans-serif;
        }
        .block-card {
          max-width: 420px;
          padding: 40px;
          border-radius: 20px;
          background: rgba(255,255,255,0.06);
          border: 1px solid rgba(255,255,255,0.15);
          backdrop-filter: blur(16px);
          text-align: center;
          box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        h1 { margin-bottom: 10px; }
        p { opacity: 0.75; }
      </style>

      <div class="block-card">
        <h1>Desktop Required</h1>
        <p>Continue on a desktop device to access Velora.</p>
        <p style="opacity:0.5; font-size:14px;">Mobile support coming soon.</p>
      </div>
    `);

    // HARD STOP
    throw new Error("Mobile blocked");
  }
})();
</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8" />
  <title>Checkout • Velora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="preload" as="image" href="assets/velora.png">
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav class="nav">
      <a href="/" id="logoLink" class="logo">
        <img src="assets/velora.png" id="logoImg" class="logo-img hidden" />
      </a>
      <div class="nav-links" id="navLinks"></div>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="checkout-page">
    <div class="checkout-card">

      <h1>Checkout</h1>

      <p class="lead">
        This is a mock checkout page. Payments are not enabled yet.
      </p>

      <!-- CART ITEMS (FILLED BY checkout.js) -->
      <div class="checkout-summary" id="checkoutSummary">
        <p style="opacity:.7">Loading cart...</p>
      </div>

      <!-- ACTIONS -->
      <div class="checkout-actions">
        <a href="cart.html" class="btn">Back to Cart</a>
        <button class="btn locked">Payment Coming Soon</button>
      </div>

    </div>
  </main>

  <!-- SCRIPTS -->
  <script type="module" src="./js/checkout.js"></script>
  <script type="module" src="./js/header.js"></script>

</body>
</html>

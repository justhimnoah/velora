<!DOCTYPE html>
<html lang="en">
<head>
  <script>
(function () {
  const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

  if (isMobile) {
    document.write(`
      <style>
        body {
          margin: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: radial-gradient(circle at top, #0b1c3f, #020615);
          color: white;
          font-family: system-ui, sans-serif;
        }
        .block-card {
          max-width: 420px;
          padding: 40px;
          border-radius: 20px;
          background: rgba(255,255,255,0.06);
          border: 1px solid rgba(255,255,255,0.15);
          backdrop-filter: blur(16px);
          text-align: center;
          box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        h1 { margin-bottom: 10px; }
        p { opacity: 0.75; }
      </style>

      <div class="block-card">
        <h1>Desktop Required</h1>
        <p>Continue on a desktop device to access Velora.</p>
        <p style="opacity:0.5; font-size:14px;">Mobile support coming soon.</p>
      </div>
    `);

    // HARD STOP
    throw new Error("Mobile blocked");
  }
})();
</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Login • Velora</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="velora-auth-bg">
  <div class="velora-auth-card">

    <h1 id="title">Sign in to Velora</h1>
    <p id="subtitle">Access your Velora console</p>

    <!-- Velora ID -->
    <div class="field" id="veloraField" style="display:none">
      <label>Velora ID</label>
      <input id="veloraId">
      <small id="veloraStatus"></small>
    </div>

    <!-- EMAIL -->
    <div class="field">
      <label>Email</label>
      <input id="email" type="email">
    </div>

    <!-- CONFIRM EMAIL -->
    <div class="field" id="confirmEmailField" style="display:none">
      <label>Confirm Email</label>
      <input id="confirmEmail" type="email">
    </div>

    <!-- PASSWORD -->
    <div class="field">
      <label>Password</label>
      <input id="password" type="password">
      <small id="passwordStatus" style="display:none"></small>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="field" id="confirmPasswordField" style="display:none">
      <label>Confirm Password</label>
      <input id="confirmPassword" type="password">
    </div>

    <button class="velora-btn" id="submitBtn" disabled>Sign In</button>

    <div class="velora-auth-links">
      <a href="#" id="resetPassword">Forgot password?</a>
      <a href="#" id="toggle">Create account</a>
    </div>

    <p class="error-text" id="error"></p>

  </div>
</div>

<script type="module" src="./js/login.js"></script>
</body>
</html>
